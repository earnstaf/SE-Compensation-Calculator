<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="calcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B6AED"/>
      <stop offset="100%" stop-color="#2850C8"/>
    </linearGradient>
    <linearGradient id="billGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8A8E0"/>
      <stop offset="100%" stop-color="#9888C8"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2555"/>
      <stop offset="100%" stop-color="#0E1530"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#101842"/>

  <!-- Calculator body -->
  <rect x="88" y="80" width="210" height="310" rx="20" fill="url(#calcGrad)"/>

  <!-- Calculator screen -->
  <rect x="108" y="100" width="170" height="60" rx="8" fill="url(#screenGrad)"/>

  <!-- Screen text -->
  <text x="260" y="142" font-family="SF Mono, Consolas, monospace" font-size="28" font-weight="600" fill="#4AE080" text-anchor="end">$4,250</text>

  <!-- Calculator buttons - row 1 -->
  <rect x="108" y="180" width="36" height="30" rx="5" fill="#1A2555" opacity="0.6"/>
  <rect x="152" y="180" width="36" height="30" rx="5" fill="#1A2555" opacity="0.6"/>
  <rect x="196" y="180" width="36" height="30" rx="5" fill="#1A2555" opacity="0.6"/>
  <rect x="240" y="180" width="36" height="30" rx="5" fill="#8f1a2e"/>

  <!-- Calculator buttons - row 2 -->
  <rect x="108" y="220" width="36" height="30" rx="5" fill="#1A2555" opacity="0.6"/>
  <rect x="152" y="220" width="36" height="30" rx="5" fill="#1A2555" opacity="0.6"/>
  <rect x="196" y="220" width="36" height="30" rx="5" fill="#1A2555" opacity="0.6"/>
  <rect x="240" y="220" width="36" height="30" rx="5" fill="#8f1a2e"/>

  <!-- Calculator buttons - row 3 -->
  <rect x="108" y="260" width="36" height="30" rx="5" fill="#1A2555" opacity="0.6"/>
  <rect x="152" y="260" width="36" height="30" rx="5" fill="#1A2555" opacity="0.6"/>
  <rect x="196" y="260" width="36" height="30" rx="5" fill="#1A2555" opacity="0.6"/>
  <rect x="240" y="260" width="36" height="30" rx="5" fill="#8f1a2e"/>

  <!-- Calculator buttons - row 4 -->
  <rect x="108" y="300" width="36" height="30" rx="5" fill="#1A2555" opacity="0.6"/>
  <rect x="152" y="300" width="80" height="30" rx="5" fill="#1A2555" opacity="0.6"/>
  <rect x="240" y="300" width="36" height="30" rx="5" fill="#751323"/>

  <!-- Dollar bill -->
  <g transform="translate(220, 220) rotate(-12)">
    <rect x="0" y="0" width="220" height="130" rx="12" fill="url(#billGrad)" stroke="#8070B0" stroke-width="2"/>
    <rect x="12" y="12" width="196" height="106" rx="6" fill="none" stroke="#8070B0" stroke-width="1" opacity="0.5"/>
    <!-- Dollar circle -->
    <circle cx="110" cy="65" r="38" fill="none" stroke="#706098" stroke-width="2.5"/>
    <!-- Dollar sign -->
    <text x="110" y="80" font-family="Georgia, serif" font-size="48" font-weight="700" fill="#504078" text-anchor="middle">$</text>
  </g>
</svg>
